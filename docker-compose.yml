services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tg_bot
      POSTGRES_PASSWORD: tg_bot
      POSTGRES_DB: tg_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_bot -d tg_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://tg_bot:tg_bot@postgres:5432/tg_bot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs

volumes:
  pgdata:
  redisdata:

# Example TLS termination for Telegram webhooks (HTTPS required).
# Telegram sends POST to WEBHOOK_BASE_URL + WEBHOOK_PATH (secret baked into URL).

upstream telegram_bot_upstream {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name bot.example.com;

    ssl_certificate     /etc/letsencrypt/live/bot.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.example.com/privkey.pem;

    client_max_body_size 25m;

    location /tg/webhook/ {
        proxy_pass http://telegram_bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://telegram_bot_upstream/health;
    }
}
